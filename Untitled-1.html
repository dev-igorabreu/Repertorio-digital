<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Relógio Completo</title>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .clock {
      width: 250px;
      height: 250px;
      border: 8px solid #222;
      border-radius: 50%;
      position: relative;
      background: #1a1a1a;
      margin-bottom: 20px;
    }

    .number {
      position: absolute;
      color: white;
      font-size: 18px;
      transform: translate(-50%, -50%);
    }

    .hand {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: left;
      border-radius: 5px;
    }

    .hour {
      width: 70px;
      height: 4px;
      background: white;
    }

    .minute {
      width: 90px;
      height: 3px;
      background: #ccc;
    }

    .second {
      width: 100px;
      height: 2px;
      background: red;
    }

    .center {
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .info {
      text-align: center;
    }

    .day {
      font-size: 22px;
      color: #00ff9d;
      margin-bottom: 5px;
    }

    .date {
      font-size: 18px;
      color: #ccc;
    }
  </style>
</head>

<body>

  <div class="clock" id="clock">
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
    <div class="center"></div>
  </div>

  <div class="info">
    <div class="day" id="day">---</div>
    <div class="date" id="date">---</div>
  </div>

  <script>
    const clock = document.getElementById("clock");

    // Criar números do relógio
    for (let i = 1; i <= 12; i++) {
      const number = document.createElement("div");
      number.className = "number";
      number.innerText = i;

      const angle = i * 30; // 360 / 12
      const radius = 110;

      const x = 125 + radius * Math.sin(angle * Math.PI / 180);
      const y = 125 - radius * Math.cos(angle * Math.PI / 180);

      number.style.left = `${x}px`;
      number.style.top = `${y}px`;

      clock.appendChild(number);
    }

    // Atualizar ponteiros e data
    function updateClock() {
      const now = new Date();

      const hours = now.getHours() % 12;
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();

      const hourDeg = (hours * 30) + (minutes * 0.5);
      const minuteDeg = minutes * 6;
      const secondDeg = seconds * 6;

      document.getElementById("hour").style.transform = `rotate(${hourDeg}deg)`;
      document.getElementById("minute").style.transform = `rotate(${minuteDeg}deg)`;
      document.getElementById("second").style.transform = `rotate(${secondDeg}deg)`;

      const days = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
      const months = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

      document.getElementById("day").innerText = days[now.getDay()];
      document.getElementById("date").innerText = `${now.getDate()} de ${months[now.getMonth()]} de ${now.getFullYear()}`;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
